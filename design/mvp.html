<!-- @dsCard group="App" viewport="920x960" name="MVP · 同传 + 设置" subtitle="V1 范围：同声传译为主界面，左上角齿轮进设置 — interactive" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>VRecorder — MVP（同传 + 设置）</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body {
    margin: 0; min-height: 100vh; background: var(--ink-900);
    display: flex; align-items: flex-start; justify-content: center;
    gap: 48px; padding: 36px 30px 30px;
    font-family: var(--font-ui);
  }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .phone {
    position: relative; width: 390px; height: 844px;
    border-radius: 46px; overflow: hidden;
    background: var(--surface-app);
    border: 1px solid var(--hairline-strong);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
  }
  .phone-label { font-size: 12px; color: var(--ink-400); letter-spacing: 0.04em; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<script type="text/babel" src="live-screen.jsx"></script>
<script type="text/babel" src="settings-screen.jsx"></script>
</head>
<body>
<div id="root" style="display: contents;"></div>
<script type="text/babel">
function Phone({ label, children }) {
  return (
    <div className="phone-col">
      <div className="phone">{children}</div>
      <span className="phone-label">{label}</span>
    </div>
  );
}

/* MVP 主界面：同声传译即首页 — 齿轮打开设置，设置内返回回到同传 */
function MvpApp() {
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  return (
    <React.Fragment>
      <window.LiveScreen onSettings={() => setSettingsOpen(true)} />
      {settingsOpen ? <window.SettingsScreen onBack={() => setSettingsOpen(false)} /> : null}
    </React.Fragment>
  );
}

function Kit() {
  return (
    <React.Fragment>
      <Phone label="主界面 · 同声传译（齿轮进设置）">
        <MvpApp />
      </Phone>
      <Phone label="设置">
        <window.SettingsScreen />
      </Phone>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Kit />);
</script>
</body>
</html>
