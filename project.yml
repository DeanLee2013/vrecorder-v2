name: vrecorder
options:
  bundleIdPrefix: com.vrecorder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: "YES"
    MARKETING_VERSION: "0.5.0"
    CURRENT_PROJECT_VERSION: "11"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  vrecorder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: vrecorder
      - path: config/openai-key.txt
        optional: true
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vrecorder.app
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "11"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "VRecorder 需要使用麦克风进行实时同声传译。"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "VRecorder 使用语音识别将你的发言实时转写为文字。"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        # Never ship the dev key resource in a distributable (Release) bundle —
        # it stays a DEBUG-only convenience (audit-3 #4). APIKeyBootstrap also
        # #if DEBUG-gates the read; this removes the file from the bundle too.
        Release:
          EXCLUDED_SOURCE_FILE_NAMES: "openai-key.txt"

  vrecorderTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: vrecorderTests
    dependencies:
      - target: vrecorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vrecorder.app.tests

  vrecorderUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: vrecorderUITests
    dependencies:
      - target: vrecorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vrecorder.app.uitests
        TEST_TARGET_NAME: vrecorder

schemes:
  vrecorder:
    build:
      targets:
        vrecorder: all
        vrecorderTests: [test]
        vrecorderUITests: [test]
    test:
      targets:
        - vrecorderTests
        - vrecorderUITests
